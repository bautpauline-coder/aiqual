services:

  traefik:
    image: traefik:v3.0
    restart: always
    command:
      - "--api=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=baut.pauline@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  n8n:
    build: .
    restart: always
    environment:
      GENERIC_TIMEZONE: Europe/Paris
      TZ: Europe/Paris
      N8N_HOST: n8n.aiqual.ai
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.aiqual.ai/
      EXECUTIONS_PROCESS: main
      DB_TYPE: sqlite
      DB_SQLITE_VACUUM_ON_STARTUP: "1"
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_PYTHON_TASKS_MODE: external
      N8N_PYTHON_TASKS_COMMAND: python3
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.aiqual.ai`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.n8n-http.rule=Host(`n8n.aiqual.ai`)"
      - "traefik.http.routers.n8n-http.entrypoints=web"
      - "traefik.http.routers.n8n-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

volumes:
  n8n_data:
    driver: local
  letsencrypt:
    driver: local
